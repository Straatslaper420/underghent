<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>GHENT // EVENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════════════════════
   GHENT//EVENT v5 — "festival signal on an underground carrier"
   Chassis: UNDERGHENT's mono/CRT discipline (near-black, hairlines,
   JetBrains Mono). Signal: neon green/pink/gold reserved for data and
   interaction. Gold belongs to the Gentse Feesten.
   ════════════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d11; --panel:#11141a; --panel2:#0e1016; --line:#232833;
  --txt:#c9d1de; --dim:#5d6675;
  --green:#00ff88; --pink:#ff2d78; --gold:#ffd700; --mint:#7fe8c1;
  --rail-h:74px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'JetBrains Mono','Courier New',monospace;color:var(--txt)}

/* CRT scanlines — kept, but quiet */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ── Header ─────────────────────────────────────────────────────────────── */
#header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--line);
  padding:12px 16px;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
#logo{font-size:13px;font-weight:800;letter-spacing:.32em;color:var(--txt);
  white-space:nowrap;user-select:none;cursor:default}
#logo .lx{color:var(--pink)}
#logo.feesten{color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.45)}
.badge{font-size:9.5px;color:var(--dim);letter-spacing:.18em;white-space:nowrap}
.badge b{color:var(--green);font-weight:700}
.badge.feesten b{color:var(--gold)}

/* ── Control bar ────────────────────────────────────────────────────────── */
#bar{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--line);
  padding:9px 12px;display:flex;flex-direction:column;gap:8px}
.barrow{display:flex;gap:8px;align-items:stretch}
#search{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
  color:var(--txt);font-family:inherit;font-size:11px;letter-spacing:.08em;
  padding:8px 11px;outline:none;transition:border-color .15s, box-shadow .15s}
#search::placeholder{color:var(--dim)}
#search:focus{border-color:var(--green);box-shadow:0 0 14px rgba(0,255,136,.18)}
#toggle{display:flex;flex-shrink:0;border:1px solid var(--line)}
.tg{font-size:9.5px;letter-spacing:.14em;padding:8px 12px;background:var(--panel);
  color:var(--dim);cursor:pointer;border:0;font-family:inherit;user-select:none;
  transition:color .12s, background .12s}
.tg.on{background:var(--green);color:#06231a;font-weight:700}
#starfilter{border:1px solid var(--line);background:var(--panel);flex-shrink:0;
  font-size:13px;line-height:1;padding:0 12px;color:var(--dim);cursor:pointer;font-family:inherit}
#starfilter.on{color:#1f1a02;background:var(--gold);border-color:var(--gold);
  box-shadow:0 0 12px rgba(255,215,0,.35)}

#chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{font-size:9px;letter-spacing:.1em;padding:6px 9px;border:1px solid var(--line);
  background:var(--panel);color:var(--dim);cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:color .12s,border-color .12s}
.chip:hover{border-color:var(--txt);color:var(--txt)}
.chip.on{border-color:var(--pink);color:var(--pink);box-shadow:0 0 10px rgba(255,45,120,.25)}

/* ── Views ──────────────────────────────────────────────────────────────── */
#mapview{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}
#map{flex:1;min-height:0;background:#0b0d11}
#listview{flex:1;min-height:0;overflow-y:auto;display:none}

/* ── Day rail ───────────────────────────────────────────────────────────── */
#dayrail{flex-shrink:0;height:var(--rail-h);background:var(--panel2);
  border-top:1px solid var(--line);display:flex;align-items:center;gap:6px;
  padding:0 10px;user-select:none;touch-action:none;position:relative}
.railbtn{flex-shrink:0;width:34px;height:38px;background:var(--panel);border:1px solid var(--line);
  color:var(--green);font-family:inherit;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.railbtn:hover{background:var(--green);color:#06231a}
.railbtn:disabled{opacity:.25;cursor:default;color:var(--dim);background:var(--panel)}
#railmid{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:7px;
  padding:0 4px;cursor:pointer}
#railtrack{position:relative;height:18px}
#railtrack .trackline{position:absolute;left:0;right:0;top:50%;height:2px;
  margin-top:-1px;background:var(--line)}
#feestseg{position:absolute;top:50%;height:4px;margin-top:-2px;background:var(--gold);
  box-shadow:0 0 10px rgba(255,215,0,.5);display:none}
#feestlbl{position:absolute;bottom:100%;margin-bottom:2px;font-size:7.5px;letter-spacing:.22em;
  color:var(--gold);white-space:nowrap;transform:translateX(-50%);display:none;
  text-shadow:0 0 8px rgba(255,215,0,.4)}
.tick{position:absolute;top:50%;width:1px;height:6px;margin-top:-3px;background:var(--dim);opacity:.55}
.tick.feest{background:var(--gold);opacity:.9}
.tick.today{width:3px;height:10px;margin-top:-5px;margin-left:-1px;background:var(--green);opacity:1;
  box-shadow:0 0 8px rgba(0,255,136,.6)}
#railthumb{position:absolute;top:50%;width:12px;height:12px;margin:-6px 0 0 -6px;
  background:var(--green);transform:rotate(45deg);cursor:grab;
  box-shadow:0 0 12px rgba(0,255,136,.55);transition:background .15s, box-shadow .15s}
#railthumb.feesten{background:var(--gold);box-shadow:0 0 14px rgba(255,215,0,.7)}
#raildate{font-size:10.5px;letter-spacing:.26em;color:var(--txt);text-align:center;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
#raildate .arrowsym{color:var(--green)}
#raildate.feesten{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.4)}

/* ── Map markers ────────────────────────────────────────────────────────── */
.edot{border:1px solid;color:#fff;background:var(--panel);
  font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  padding:3px 0;white-space:nowrap;cursor:pointer;letter-spacing:.08em;
  width:52px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.6);
  animation:dotin .22s ease-out}
@keyframes dotin{from{opacity:0;transform:translateY(5px) scale(.85)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.edot{animation:none}}

/* ── Popups ─────────────────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{background:var(--panel2)!important;border:1px solid var(--line)!important;
  border-radius:0!important;box-shadow:0 8px 30px rgba(0,0,0,.7)!important;padding:0!important;position:relative}
.leaflet-popup-content{margin:0!important;color:var(--txt);width:auto!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:var(--pink)!important;font-size:17px!important;
  right:5px!important;top:3px!important;z-index:6}
.pbody{padding:11px 13px 12px}
.ptitle{font-size:11px;font-weight:700;color:var(--txt);letter-spacing:.04em;line-height:1.45;
  margin-bottom:7px;padding-right:14px}
.prow{font-size:8.5px;margin-bottom:3px;letter-spacing:.06em;line-height:1.55;color:var(--dim)}
.pvenue a{color:var(--pink);text-decoration:underline;text-underline-offset:2px}
.ptime{color:var(--gold)}
.pdesc{color:var(--txt);opacity:.75;margin-top:6px;line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pactions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
.plink{display:inline-block;font-size:8px;color:var(--green);border:1px solid var(--green);
  padding:4px 8px;text-decoration:none;letter-spacing:.14em;transition:background .12s,color .12s}
.plink:hover{background:var(--green);color:#06231a}
.ptags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:7.5px;letter-spacing:.06em;color:var(--dim);border:1px solid var(--line);padding:2px 5px}
.tag.stat{color:var(--mint);border-color:#1d3a30}

/* ── Zoom / attribution ─────────────────────────────────────────────────── */
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--panel2)!important;color:var(--green)!important;
  border:1px solid var(--line)!important;border-radius:0!important;
  font-family:'JetBrains Mono',monospace!important;font-size:14px!important;
  width:28px!important;height:28px!important;line-height:26px!important;
  display:flex!important;align-items:center!important;justify-content:center!important}
.leaflet-control-zoom a:hover{background:var(--green)!important;color:#06231a!important}
.leaflet-bar{box-shadow:0 4px 14px rgba(0,0,0,.5)!important}
.leaflet-control-attribution{background:rgba(11,13,17,.85)!important;color:#3a4150!important;
  font-size:8px!important;font-family:'JetBrains Mono',monospace!important}
.leaflet-control-attribution a{color:#4a5264!important}

/* ── List view ──────────────────────────────────────────────────────────── */
#feed{max-width:660px;margin:0 auto;padding:14px 14px 50px}
#listmode{display:flex;gap:6px;margin-bottom:14px}
.lm{font-size:9px;letter-spacing:.14em;padding:7px 11px;border:1px solid var(--line);
  background:var(--panel);color:var(--dim);cursor:pointer;font-family:inherit}
.lm.on{border-color:var(--green);color:var(--green)}
.lmnav{margin-left:auto;display:flex;gap:6px}
.daygroup{margin-bottom:24px}
.dayhdr{position:sticky;top:0;z-index:5;background:var(--bg);
  display:flex;align-items:center;gap:9px;
  font-size:10px;font-weight:700;letter-spacing:.26em;color:var(--txt);
  padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:12px}
.dayhdr .arrowsym{color:var(--green)}
.daypill{background:var(--gold);color:#1f1a02;font-weight:700;font-size:8px;letter-spacing:.1em;
  padding:3px 7px;box-shadow:0 0 10px rgba(255,215,0,.4)}
.card{display:flex;gap:0;border:1px solid var(--line);border-left:3px solid var(--line);
  background:var(--panel2);margin-bottom:10px;text-decoration:none;color:inherit;
  transition:transform .1s ease,border-color .12s,box-shadow .15s;overflow:hidden}
.card:hover{transform:translateX(2px);box-shadow:0 6px 22px rgba(0,0,0,.55)}
.thumb{width:96px;flex-shrink:0;background:var(--panel);align-self:stretch;min-height:88px;
  border-right:1px solid var(--line);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.92)}
.thumb .ph{font-size:20px;color:#222a38}
.cbody{padding:10px 12px 11px;min-width:0;flex:1}
.ttl{font-size:11.5px;font-weight:700;color:var(--txt);letter-spacing:.03em;line-height:1.4;margin-bottom:6px}
.meta{font-size:8.5px;letter-spacing:.07em;line-height:1.7;color:var(--dim)}
.meta .venue{color:var(--pink)}
.meta .time{color:var(--gold)}
.desc{color:var(--txt);opacity:.65;font-size:8.5px;line-height:1.6;margin-top:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.empty{text-align:center;color:var(--dim);font-size:10px;letter-spacing:.22em;padding:70px 20px}
#status{font-size:8px;color:#39414f;letter-spacing:.12em;text-align:center;padding:0 0 26px}

/* ── Stars ──────────────────────────────────────────────────────────────── */
.starbtn{background:none;border:0;cursor:pointer;font-family:inherit;line-height:1;
  color:#39414f;padding:2px;font-size:16px;transition:color .1s,text-shadow .1s}
.starbtn:hover{color:var(--gold)}
.starbtn.starred{color:var(--gold);text-shadow:0 0 7px rgba(255,215,0,.6)}
.popstar{position:absolute;top:26px;right:5px;z-index:6;width:22px;height:22px;font-size:12px;
  display:flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid var(--line)}
.popstar.starred{border-color:var(--gold)}
.cstar{display:flex;align-items:center;flex-shrink:0;padding:0 12px;border-left:1px dashed var(--line)}
.liststar{font-size:22px;padding:4px}

/* ── Loader ─────────────────────────────────────────────────────────────── */
#loader{position:fixed;inset:0;z-index:10002;background:rgba(11,13,17,.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s ease}
#loader.bye{opacity:0;pointer-events:none}
#eq{display:flex;gap:5px;align-items:flex-end;height:46px}
#eq i{width:9px;background:var(--green);box-shadow:0 0 10px rgba(0,255,136,.5);
  animation:eqb 0.9s ease-in-out infinite}
#eq i:nth-child(2){background:var(--pink);box-shadow:0 0 10px rgba(255,45,120,.5);animation-delay:.12s}
#eq i:nth-child(3){background:var(--gold);box-shadow:0 0 10px rgba(255,215,0,.5);animation-delay:.24s}
#eq i:nth-child(4){background:var(--mint);box-shadow:0 0 10px rgba(127,232,193,.5);animation-delay:.36s}
#eq i:nth-child(5){background:var(--green);box-shadow:0 0 10px rgba(0,255,136,.5);animation-delay:.48s}
@keyframes eqb{0%,100%{height:8px}50%{height:46px}}
#loadmsg{font-size:10px;letter-spacing:.26em;color:var(--txt);text-align:center;
  animation:loadblink 1.6s ease-in-out infinite}
@keyframes loadblink{0%,100%{opacity:1}50%{opacity:.45}}
#loadsub{font-size:8px;letter-spacing:.3em;color:var(--dim)}
@media (prefers-reduced-motion:reduce){#eq i,#loadmsg{animation:none}#eq i{height:24px}}

/* ── Confetti ───────────────────────────────────────────────────────────── */
.confetti-layer{position:fixed;inset:0 0 auto 0;height:0;z-index:10001;pointer-events:none}
.confetti-bit{position:absolute;top:-14px;width:7px;height:12px;opacity:0;animation:confetti-fall linear forwards}
@keyframes confetti-fall{0%{opacity:1;transform:translate(0,0) rotate(0)}
  100%{opacity:0;transform:translate(var(--dx),80vh) rotate(var(--rot))}}

/* ── Route button + modal ───────────────────────────────────────────────── */
.routebtn{position:absolute;right:10px;bottom:12px;z-index:1000;
  background:var(--panel2);border:1px solid var(--gold);color:var(--gold);
  font-family:inherit;font-size:9.5px;letter-spacing:.14em;padding:9px 13px;cursor:pointer;
  box-shadow:0 4px 18px rgba(0,0,0,.5);transition:background .12s,color .12s}
.routebtn:hover{background:var(--gold);color:#1f1a02}
.routebtn:disabled{opacity:.35;cursor:not-allowed;border-color:var(--line);color:var(--dim);background:var(--panel2)}
.rm-overlay{position:fixed;inset:0;z-index:10000;background:rgba(8,10,14,.88);
  display:flex;align-items:center;justify-content:center;padding:18px}
.rm-box{width:100%;max-width:380px;background:var(--bg);border:1px solid var(--line);
  box-shadow:0 18px 60px rgba(0,0,0,.8);padding:18px}
.rm-title{font-size:11px;color:var(--gold);letter-spacing:.22em;margin-bottom:6px;font-weight:700}
.rm-lbl{display:block;font-size:8px;color:var(--dim);letter-spacing:.22em;margin:13px 0 5px}
.rm-row{display:flex;gap:8px}
.rm-input{width:100%;min-width:0;background:var(--panel);border:1px solid var(--line);color:var(--txt);
  font-family:inherit;font-size:11px;letter-spacing:.05em;padding:8px 10px;outline:none}
.rm-input:focus{border-color:var(--green)}
.rm-btn{background:var(--panel);border:1px solid var(--line);color:var(--dim);font-family:inherit;
  font-size:9px;letter-spacing:.12em;padding:8px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.rm-btn:hover{border-color:var(--gold);color:var(--gold)}
.rm-btn:disabled{opacity:.5;cursor:not-allowed}
.rm-primary{border-color:var(--green);color:var(--green)}
.rm-primary:hover{background:var(--green);color:#06231a}
.rm-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.rm-notice{font-size:8px;color:var(--gold);border:1px solid var(--gold);padding:6px 8px;
  margin-top:12px;line-height:1.5;letter-spacing:.05em}

@media (max-width:560px){
  #logo{font-size:11px;letter-spacing:.22em}
  .thumb{width:78px}
  :root{--rail-h:68px}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1 id="logo">GHENT<span class="lx">//</span>EVENT</h1>
    <span class="badge" id="badge"><b>0</b> SIGNALS</span>
  </div>

  <div id="bar">
    <div class="barrow">
      <input id="search" placeholder="SEARCH THE CITY…" autocomplete="off"/>
      <div id="toggle">
        <button class="tg on" data-view="map">MAP</button>
        <button class="tg" data-view="list">LIST</button>
      </div>
      <button id="starfilter" type="button" aria-pressed="false"
        title="Show starred events only" aria-label="Show starred events only">★</button>
    </div>
    <div id="chips"></div>
  </div>

  <!-- MAP VIEW -->
  <div id="mapview">
    <div id="map"></div>
    <div id="dayrail" aria-label="Browse dates, one day at a time">
      <button class="railbtn" id="rprev" aria-label="Previous day">◀</button>
      <div id="railmid">
        <div id="railtrack">
          <div class="trackline"></div>
          <div id="feestseg"></div>
          <div id="feestlbl">GENTSE FEESTEN</div>
          <div id="ticks"></div>
          <div id="railthumb"></div>
        </div>
        <div id="raildate"><span class="arrowsym">►</span> ──</div>
      </div>
      <button class="railbtn" id="rnext" aria-label="Next day">▶</button>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="listview">
    <div id="feed"></div>
    <div id="status"></div>
  </div>
</div>

<!-- LOADER -->
<div id="loader" aria-live="polite">
  <div id="eq"><i></i><i></i><i></i><i></i><i></i></div>
  <div id="loadmsg">BRIBING THE DOORMAN…</div>
  <div id="loadsub">GHENT//EVENT · TUNING IN</div>
</div>

<!-- ROUTE MODAL -->
<div id="routemodal" class="rm-overlay" style="display:none">
  <div class="rm-box">
    <div class="rm-title">▶ BUILD WALKING ROUTE</div>
    <label class="rm-lbl" for="rm-start">START LOCATION</label>
    <div class="rm-row">
      <input id="rm-start" class="rm-input" placeholder="Gent-Sint-Pieters" autocomplete="off"/>
      <button id="rm-geo" type="button" class="rm-btn">USE MY LOCATION</button>
    </div>
    <label class="rm-lbl" for="rm-end">END LOCATION</label>
    <input id="rm-end" class="rm-input" placeholder="Gent-Sint-Pieters" autocomplete="off"/>
    <div id="rm-daywrap" style="display:none">
      <label class="rm-lbl" for="rm-day">DAY</label>
      <select id="rm-day" class="rm-input"></select>
    </div>
    <div id="rm-notice" class="rm-notice" style="display:none"></div>
    <div class="rm-actions">
      <button id="rm-cancel" type="button" class="rm-btn">CANCEL</button>
      <button id="rm-build" type="button" class="rm-btn rm-primary">BUILD ROUTE ▶</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ──────────────────────────────────────────────────────────────────────────
   GHENT//EVENT v5 — single-file front page.
   MAP shows ONE day at a time, driven by the bottom day rail (the Gentse
   Feesten window glows gold on the track). LIST follows the selected day,
   with an ALL-DAYS escape. Data: two published Google Sheet tabs
   (fb_events + feesten); human `_override`/`hide` columns always win.
   ────────────────────────────────────────────────────────────────────────── */

const UNDERGHENT_URL = "underghent.html";       // secret: slam rail to far-left 3× fast

const SHEET_ID = "18ucjcKbxhJ88M-qboMeZRnMf4VX2EnWLlHhtyDkobms";
const FB_CSV_URL      = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1095868420`;
const FEESTEN_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=668636843`;

// Tiny built-in fallback so the page never renders empty if both fetches fail.
const SAMPLE = [

  {id:'s2',sid:'s2',title:'Street Food Fest',venue:'Korenmarkt',address:'Korenmarkt',date:'2026-06-12',time:'12:00',endTime:'',lat:51.0534,lng:3.7211,desc:'International street food and local craft beers.',image:null,url:'#',categories:['FOOD','FESTIVAL'],going:1450,interested:5200,paid:false,organizer:'Gent Smaakt',source:'feesten'},

let activeGroups = new Set();

// ── Date helpers ───────────────────────────────────────────────────────────
const MO = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DY = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
function dotLbl(d){const dt=new Date(d+'T12:00:00');return MO[dt.getMonth()]+' '+String(dt.getDate()).padStart(2,'0');}
function dayLabel(d){
  if(!d) return 'DATE TBA';
  const dt=new Date(d+'T12:00:00');
  if(isNaN(dt)) return 'DATE TBA';
  return DY[dt.getDay()]+' '+dt.getDate()+' '+MO[dt.getMonth()]+' '+dt.getFullYear();
}
// Gentse Feesten 2026 window (inclusive) — days 17–26 July
const FEESTEN_START='2026-07-17', FEESTEN_END='2026-07-26';
function inFeesten(d){ return !!d && d>=FEESTEN_START && d<=FEESTEN_END; }
function feestenDay(d){ return Math.round((new Date(d+'T12:00:00')-new Date(FEESTEN_START+'T12:00:00'))/864e5)+1; }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtStat(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'k':String(n);}

// ── CSV parsing (RFC-4180-ish) ─────────────────────────────────────────────
function parseCSV(text){
  const rows=[]; let row=[], field='', i=0, inQ=false;
  while(i<text.length){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
      field+=c;i++;continue;
    }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field='';i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function csvToObjects(text){
  const rows=parseCSV(text);
  if(!rows.length) return [];
  const headers=rows[0].map(h=>h.trim());
  const out=[];
  for(let r=1;r<rows.length;r++){
    const cells=rows[r];
    if(cells.length===1 && cells[0]==='') continue;
    const o={};
    headers.forEach((h,idx)=>{o[h]=cells[idx]!==undefined?cells[idx]:'';});
    out.push(o);
  }
  return out;
}

// ── Row → event (override columns ALWAYS win; `hide` rows never render) ────
function pick(row,keys){
  for(const k of keys){ const v=row[k]; if(v!=null && String(v).trim()!=='') return String(v).trim(); }
  return '';
}
function toNum(v){ if(v==null||v==='')return null; const n=parseFloat(String(v).replace(',','.')); return isFinite(n)?n:null; }
function toInt(v){ const n=parseInt(String(v).replace(/[^\d]/g,''),10); return isFinite(n)?n:0; }
function normDate(d){
  if(!d) return '';
  const m=String(d).match(/\d{4}-\d{2}-\d{2}/); if(m) return m[0];
  const dt=new Date(d); return isNaN(dt)?'':dt.toISOString().slice(0,10);
}
function normTime(t){ const m=String(t||'').match(/\d{1,2}:\d{2}/); return m?m[0]:''; }
function isTruthyCell(v){ return /^(true|1|yes|x|ja)$/i.test(String(v||'').trim()); }
function buildCategories(row){
  const cats=new Set();
  const add=s=>{ if(!s)return; String(s).split(/[,/>]/).forEach(p=>{
    const t=p.trim(); if(t && t.length<=24) cats.add(t.toUpperCase()); }); };
  add(row.genre_override||row.genre); add(row.subgenre); add(row.genre_raw);
  add(row.gf_categories||row.gf_raw_categories||row.gf_genre);
  return [...cats];
}
function isPaid(row){
  if(pick(row,['ticket_url','gf_ticket_url'])) return true;
  const price=pick(row,['price','gf_price']).toLowerCase();
  if(!price) return false;
  if(/gratis|free|gratuit/.test(price)) return false;
  return /[1-9]/.test(price) || /€|eur/.test(price);
}
// Show the actual price when we have one; fall back to TICKETED/FREE.
function priceLabel(e){
  const p=String(e.price||'').trim();
  if(p){
    if(/gratis|free|gratuit|^0([,.]0+)?$/i.test(p)) return 'FREE';
    return esc(p);
  }
  return e.paid?'TICKETED':'FREE';
}
function mapRow(row,source){
  if(isTruthyCell(row.hide)) return null;                            // human kill-switch
  const sid = pick(row,['event_id','facebook_id','gf_node_id']);
  return {
    id: sid || (source+'_'+Math.random().toString(36).slice(2)),
    sid,
    title: pick(row,['title','gf_title']) || 'UNTITLED',
    venue: pick(row,['venue_override','venue','gf_venue']),          // override > auto
    address: pick(row,['address_override','address','gf_address']),
    date: normDate(pick(row,['date_start','gf_date_start'])),
    time: normTime(pick(row,['hour_start','gf_time_start'])),
    endTime: normTime(pick(row,['hour_end','gf_time_end'])),
    lat: toNum(pick(row,['latitude_override','latitude','gf_lat'])),
    lng: toNum(pick(row,['longitude_override','longitude','gf_lng'])),
    desc: pick(row,['description','gf_description','details']),
    image: pick(row,['image_url','gf_image_url']) || null,
    url: pick(row,['source_url','gf_detail_url','ticket_url','gf_ticket_url']) || '#',
    categories: buildCategories(row),
    going: toInt(pick(row,['going'])),
    interested: toInt(pick(row,['interested'])),
    paid: isPaid(row),
    price: pick(row,['price','gf_price']),
    organizer: pick(row,['organizers','gf_organizer']),
    source
  };
}

// ── Cross-tab dedupe (same date + fuzzy title; prefer feesten) ─────────────
function normTitle(t){
  return String(t||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]+/g,' ').trim();
}
function bigrams(s){const m=new Map();for(let i=0;i<s.length-1;i++){const b=s.substr(i,2);m.set(b,(m.get(b)||0)+1);}return m;}
function similar(a,b){
  if(!a||!b) return a===b?1:0;
  if(a===b) return 1;
  const A=bigrams(a),B=bigrams(b); let inter=0,total=0;
  A.forEach((c,b)=>{total+=c; if(B.has(b)) inter+=Math.min(c,B.get(b));});
  B.forEach(c=>{total+=c;});
  return total?2*inter/total:0;
}
function dedupe(events){
  const kept=[], byDate={}, seen=new Set();
  let removed=0;
  events.forEach(e=>{
    if(!e.date){ kept.push(e); return; }
    // PASS 1 — exact fingerprint within the same source. Kills literally
    // duplicated sheet rows (the fb tab held pairs identical except for a
    // regenerated event_id, which doubled every fb event in the counters).
    // Venue is part of the key: two boat tours, same title/time, different
    // jetty = two real events.
    const fp=e.source+'|'+normTitle(e.title)+'|'+e.date+'|'+(e.time||'')+'|'+normTitle(e.venue||'');
    if(seen.has(fp)){ removed++; return; }
    seen.add(fp);
    (byDate[e.date]=byDate[e.date]||[]).push(e);
  });
  Object.values(byDate).forEach(group=>{
    const local=[];
    group.forEach(e=>{
      const nt=normTitle(e.title);
      // CROSS-SOURCE only: each tab is already deduped upstream (feesten by
      // node id). Same-source same-day similar titles are real distinct events
      // (e.g. a guided tour running 3× on one day) — never merge those.
      const dupIdx=local.findIndex(k=>k.source!==e.source && similar(normTitle(k.title),nt)>=0.85);
      if(dupIdx>=0){
        removed++;
        if(local[dupIdx].source!=='feesten' && e.source==='feesten') local[dupIdx]=e;
      } else local.push(e);
    });
    kept.push(...local);
  });
  return {kept,removed};
}

// ── Event-type groups ──────────────────────────────────────────────────────
const GROUPS = [
  {key:'MUSIC',  label:'MUSIC',  color:'#b14bff', stems:['DJ','CONCERT']},
  {key:'DANCE',  label:'DANCE',  color:'#ff2df0', stems:['DANS','BAL']},
  {key:'WORD',   label:'WORD',   color:'#ff9d2e', stems:['THEATER','COMEDY','LEZING','POEZIE','VERTELLING']},
  {key:'ACTIVE', label:'ACTIVE', color:'#00ff88', stems:['SPEL','SPORT','WANDELING']},
  {key:'BOATS',  label:'BOATS',  color:'#2b5bd8', stems:['BOOT']},
];
const GROUP_OTHER = {key:'OTHER', color:'#ff2d78'};
function cleanCat(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'')
  .toUpperCase().replace(/[^A-Z0-9 ]+/g,'').trim(); }
function catGroup(cat){ const c=cleanCat(cat); return GROUPS.find(g=>g.stems.some(st=>c.startsWith(st)))||null; }
function eventGroup(e){
  const cats=e.categories||[];
  if(cats.some(c=>{const g=catGroup(c);return g&&g.key==='BOATS';})) return GROUPS.find(g=>g.key==='BOATS');
  for(const g of GROUPS){ if(g.key==='BOATS') continue; if(cats.some(c=>catGroup(c)===g)) return g; }
  return GROUP_OTHER;
}
function textOn(hex){ const c=hex.replace('#',''); const r=parseInt(c.substr(0,2),16),
  g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  return (0.299*r+0.587*g+0.114*b)>140?'#0b0d11':'#fff'; }

// ── Filtering ──────────────────────────────────────────────────────────────
function matches(e){
  if(starFilterOn && !isStarred(eventKey(e))) return false;
  const cats=e.categories||[];
  if(activeGroups.size || activeCats.size){
    const inGroup=[...activeGroups].some(gk=>cats.some(c=>{const g=catGroup(c);return g&&g.key===gk;}));
    const inType =cats.some(c=>activeCats.has(c));
    if(!inGroup && !inType) return false;
  }
  if(q){
    const hay=(e.title+' '+e.venue+' '+(e.desc||'')+' '+(e.organizer||'')+' '+
      (e.address||'')+' '+cats.join(' ')).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

// ── Chips ──────────────────────────────────────────────────────────────────
function topCategories(limit){
  const freq={};
  ALL.forEach(e=>(e.categories||[]).forEach(c=>{freq[c]=(freq[c]||0)+1;}));
  const sorted=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]||a.localeCompare(b));
  return sorted.slice(0,limit);
}
function renderChips(){
  const wrap=document.getElementById('chips');
  wrap.innerHTML='';
  const allOn=activeCats.size===0 && activeGroups.size===0;
  const allEl=document.createElement('div');
  allEl.className='chip'+(allOn?' on':'');
  allEl.textContent='ALL';
  allEl.onclick=()=>{ activeCats.clear(); activeGroups.clear(); renderChips(); renderAll(); };
  wrap.appendChild(allEl);
  GROUPS.forEach(g=>{
    const on=activeGroups.has(g.key);
    const el=document.createElement('div');
    el.className='chip grp'+(on?' on':'');
    el.textContent=g.label;
    el.style.borderColor=g.color;
    el.style.color=on?'#0b0d11':g.color;
    el.style.background=on?g.color:'var(--panel)';
    el.style.boxShadow=on?('0 0 10px '+g.color):'';
    el.onclick=()=>{
      if(activeGroups.has(g.key)) activeGroups.delete(g.key); else activeGroups.add(g.key);
      renderChips();renderAll();
    };
    wrap.appendChild(el);
  });
  const PINNED=['ANDERE','DIVERS','VARIA'];
  const present=new Set(); ALL.forEach(e=>(e.categories||[]).forEach(c=>present.add(c)));
  const rest=topCategories(16).filter(c=>!PINNED.includes(c));
  [...PINNED.filter(c=>present.has(c)), ...rest].forEach(c=>{
    const el=document.createElement('div');
    const on=activeCats.has(c);
    el.className='chip'+(on?' on':'');
    el.textContent=c;
    el.onclick=()=>{
      if(activeCats.has(c)) activeCats.delete(c); else activeCats.add(c);
      renderChips();renderAll();
    };
    wrap.appendChild(el);
  });
}

// ── LIST view ──────────────────────────────────────────────────────────────
function cardHtml(e){
  const key=eventKey(e), on=isStarred(key);
  const href=e.url&&e.url!=='#'?` href="${esc(e.url)}" target="_blank" rel="noopener"`:'';
  const thumb=e.image?`<img loading="lazy" decoding="async" src="${esc(e.image)}" alt="">`:'<span class="ph">◫</span>';
  const tags=(e.categories||[]).slice(0,3).map(t=>`<span class="tag">#${esc(t)}</span>`).join('');
  const stat=(e.going||e.interested)
    ? `<span class="tag stat">▲ ${fmtStat(e.going||0)} GOING · ${fmtStat(e.interested||0)} INT</span>` : '';
  const edge=eventGroup(e).color;
  const when=e.time?(e.time+(e.endTime?'–'+e.endTime:'')):'TIME TBA';
  return `<a class="card" style="border-left-color:${edge}"${href}>

      <div class="ttl">${esc(e.title)}</div>

    </div>

      data-key="${esc(key)}" aria-pressed="${on?'true':'false'}"

}
function renderFeed(){
  const feed=document.getElementById('feed');
  const sel=DATES[dayIdx];
  let list=ALL.filter(matches);

  const modeBar=`<div id="listmode">
    <button class="lm${listMode==='day'?' on':''}" data-lm="day">${sel?esc(dayLabel(sel)):'DAY'}</button>

    ${listMode==='day'?`<span class="lmnav">

  if(!list.length){
    feed.innerHTML=modeBar+'<div class="empty">▓ NO SIGNALS ON THIS FREQUENCY ▓</div>';

  }
  const groups={};
  list.forEach(e=>{(groups[e.date||'TBA']=groups[e.date||'TBA']||[]).push(e);});

    return `<div class="daygroup"><div class="dayhdr"><span class="arrowsym">►</span> ${dayLabel(k)}${pill}</div>${cards}</div>`;

function wireListMode(){

// ── MAP: per-day marker layers (built lazily, cached) ──────────────────────
function buildDayMarkers(date){
  if(DAY_MARKERS.has(date)) return DAY_MARKERS.get(date);
  const entries=[];
  ALL.forEach(e=>{
    if(e.date!==date || e.lat==null || e.lng==null) return;
    const g=eventGroup(e);
    const icon=L.divIcon({
      className:'',
      html:`<div class="edot" style="background:${g.color};border-color:${g.color};color:${textOn(g.color)}">${e.time||'TBA'}</div>`,
      iconSize:[52,20],iconAnchor:[26,10]
    });
    const m=L.marker([e.lat,e.lng],{icon});
    const desc=e.desc?`<div class="prow pdesc">${esc(e.desc)}</div>`:'';
    const tags=(e.categories||[]).slice(0,3).map(t=>`<span class="tag">#${esc(t)}</span>`).join('');
    const link=e.url&&e.url!=='#'?`<a class="plink" href="${esc(e.url)}" target="_blank" rel="noopener">► DETAILS</a>`:'';
    const actions=`<div class="pactions">${link}<span class="ptags">${tags}</span></div>`;
    const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${e.lat},${e.lng}`;
    const venue=`<div class="prow pvenue">◈ <a href="${mapsUrl}" target="_blank" rel="noopener">${esc(e.venue||'VENUE TBA')}</a></div>`;
    const when=e.time?(e.time+(e.endTime?'–'+e.endTime:'')):'TBA';
    const skey=eventKey(e), son=isStarred(skey);
    const star=`<button type="button" class="starbtn popstar${son?' starred':''}" data-key="${esc(skey)}"
      aria-pressed="${son?'true':'false'}" aria-label="${son?'Remove from starred':'Add to starred'}">${son?'★':'☆'}</button>`;
    m.bindPopup(
      star+`<div class="pbody"><div class="ptitle">${esc(e.title)}</div>`+
      venue+
      `<div class="prow ptime">◷ ${dayLabel(e.date)} @ ${esc(when)} · ${priceLabel(e)}</div>`+
      desc+actions+`</div>`,
      {maxWidth:250,minWidth:210,autoPan:true}
    );
    entries.push({ev:e,marker:m});
  });
  DAY_MARKERS.set(date,entries);
  return entries;
}
function renderMap(){
  if(!map) return 0;
  const sel=DATES[dayIdx];
  if(dayLayer){ map.removeLayer(dayLayer); dayLayer=null; }
  let cnt=0;
  if(sel){
    dayLayer=L.layerGroup();
    buildDayMarkers(sel).forEach(({ev,marker})=>{
      if(matches(ev)){ dayLayer.addLayer(marker); cnt++; }
    });
    dayLayer.addTo(map);
  }
  // festival mode
  const fest=inFeesten(sel);
  const logo=document.getElementById('logo');
  logo.classList.toggle('feesten',fest);
  logo.innerHTML = fest ? 'GHENT<span class="lx">//</span>SE&nbsp;FEESTEN' : 'GHENT<span class="lx">//</span>EVENT';
  if(fest && !wasFeesten) partyConfetti();
  wasFeesten=fest;
  renderRail();
  return cnt;
}

// ── Badge ──────────────────────────────────────────────────────────────────

  for(let i=0;i<52;i++){
    const bit=document.createElement('i');

    bit.style.animationDelay=(Math.random()*0.35)+'s';

function railPct(i){

function buildRail(){

  ticks.innerHTML='';
  const today=new Date().toISOString().slice(0,10);
  DATES.forEach((d,i)=>{
    const t=document.createElement('div');
    t.className='tick'+(inFeesten(d)?' feest':'')+(d===today?' today':'');
    t.style.left=railPct(i)+'%';
    ticks.appendChild(t);
  });
  // Feesten gold segment + label
  const seg=document.getElementById('feestseg');
  const lbl=document.getElementById('feestlbl');
  const fi=DATES.findIndex(d=>inFeesten(d));
  let li=-1;
  for(let i=DATES.length-1;i>=0;i--){ if(inFeesten(DATES[i])){ li=i; break; } }
  if(fi>=0 && li>=fi){
    const a=railPct(fi), b=railPct(li);
    seg.style.left=a+'%'; seg.style.width=Math.max(b-a,1.5)+'%'; seg.style.display='block';
    lbl.style.left=((a+b)/2)+'%'; lbl.style.display='block';
  }else{ seg.style.display='none'; lbl.style.display='none'; }
  renderRail();
}
function renderRail(){
  const sel=DATES[dayIdx];
  railThumb.style.left=railPct(dayIdx)+'%';
  const fest=inFeesten(sel);
  railThumb.classList.toggle('feesten',fest);
  railDate.classList.toggle('feesten',fest);
  railDate.innerHTML='<span class="arrowsym">►</span> '+(sel
    ? esc(dayLabel(sel))+(fest?' · DAY '+feestenDay(sel):'')
    : '──');
  document.getElementById('rprev').disabled = dayIdx<=0;
  document.getElementById('rnext').disabled = dayIdx>=DATES.length-1;
}
function setDay(i,opts){
  const n=DATES.length;
  const clamped=Math.max(0,Math.min(n-1,i));
  const changed=clamped!==dayIdx;
  dayIdx=clamped;
  // secret doorway: slam the rail to the far-left 3× within 2s → UNDERGHENT
  if(dayIdx===0 && (!opts||(!opts.silent&&!opts.nohit))){
    const now=Date.now();
    minHits.push(now);
    minHits=minHits.filter(t=>now-t<=2000);
    if(minHits.length>=3){ minHits=[]; window.location.href=UNDERGHENT_URL; return; }
  }
  if(changed || (opts&&opts.force)) renderAll(); else renderRail();
}
function stepDay(d){ setDay(dayIdx+d); }
document.getElementById('rprev').addEventListener('click',()=>stepDay(-1));
document.getElementById('rnext').addEventListener('click',()=>stepDay(1));

// drag / tap on the track
function idxFromClientX(x){
  const r=railTrack.getBoundingClientRect();
  const f=Math.max(0,Math.min(1,(x-r.left)/r.width));
  return Math.round(f*(DATES.length-1));
}
let dragging=false;
const railMid=document.getElementById('railmid');
railMid.addEventListener('pointerdown',e=>{
  if(!DATES.length) return;
  dragging=true;
  railMid.setPointerCapture(e.pointerId);
  setDay(idxFromClientX(e.clientX),{nohit:true}); // gesture counts on release only
});
railMid.addEventListener('pointermove',e=>{
  if(!dragging) return;
  setDay(idxFromClientX(e.clientX),{silent:true});
});
railMid.addEventListener('pointerup',e=>{
  if(!dragging) return;
  dragging=false;
  setDay(idxFromClientX(e.clientX));   // counts for the secret gesture
});
railMid.addEventListener('pointercancel',()=>{dragging=false;});
// keyboard
window.addEventListener('keydown',e=>{
  if(e.target&&/INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;
  if(e.key==='ArrowLeft') stepDay(-1);
  else if(e.key==='ArrowRight') stepDay(1);
});

// ── View toggle ────────────────────────────────────────────────────────────
function setView(v){
  view=v;
  document.querySelectorAll('#toggle .tg').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  document.getElementById('mapview').style.display = v==='map'?'flex':'none';
  document.getElementById('listview').style.display = v==='list'?'block':'none';
  if(v==='map' && map){ setTimeout(()=>{map.invalidateSize();renderAll();},0); }
  else renderAll();
}
document.querySelectorAll('#toggle .tg').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  q=e.target.value.trim().toLowerCase(); renderAll();
});

// ── Map init ───────────────────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{center:[51.0515,3.7200],zoom:14,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap contributors © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);
}

// ── Load ───────────────────────────────────────────────────────────────────
async function fetchCSV(url){
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return csvToObjects(await r.text());
}
function defaultDateIndex(){
  const today=new Date().toISOString().slice(0,10);
  const i=DATES.findIndex(d=>d>=today);
  return i>=0?i:0;
}
// ── Loader overlay ─────────────────────────────────────────────────────────
const LOAD_MSGS=[
  'BRIBING THE DOORMAN…','UNTANGLING THE CABLES…','WAKING UP THE DJ…',
  'POLISHING THE COBBLESTONES…','HERDING PIGEONS OFF THE STAGE…',
  'COUNTING DISCO BALLS…','SOUNDCHECK… ÉÉN… TWEE…','CHILLING THE BEERS…',
  'CONVINCING THE DRAGON TO COME DOWN…','TAPPING INTO THE CITY SIGNAL…'
];
let loadMsgTimer=null;
function startLoader(){
  const msg=document.getElementById('loadmsg');
  let i=Math.floor(Math.random()*LOAD_MSGS.length);
  msg.textContent=LOAD_MSGS[i];
  loadMsgTimer=setInterval(()=>{ i=(i+1)%LOAD_MSGS.length; msg.textContent=LOAD_MSGS[i]; },1400);
}
function stopLoader(){
  clearInterval(loadMsgTimer);
  const el=document.getElementById('loader');
  el.classList.add('bye');
  setTimeout(()=>el.remove(),450);
}
async function load(){
  startLoader();
  try{ await loadData(); } finally{ stopLoader(); }
}
async function loadData(){
  const status=document.getElementById('status');
  const [fbRes,feRes]=await Promise.allSettled([fetchCSV(FB_CSV_URL),fetchCSV(FEESTEN_CSV_URL)]);

  const fbRows = fbRes.status==='fulfilled' ? fbRes.value : [];
  const feRows = feRes.status==='fulfilled' ? feRes.value : [];
  if(fbRes.status==='rejected') console.warn('FB tab failed:',fbRes.reason);
  if(feRes.status==='rejected') console.warn('Feesten tab failed:',feRes.reason);

  const fbAll = fbRows.map(r=>mapRow(r,'fb')).filter(Boolean);
  const feAll = feRows.map(r=>mapRow(r,'feesten')).filter(Boolean);
  const fbEvents = fbAll.filter(e=>e.date);
  const feEvents = feAll.filter(e=>e.date);

  if(fbEvents.length || feEvents.length){
    const merged=[...feEvents,...fbEvents];
    const {kept,removed}=dedupe(merged);
    ALL=kept;
    console.log(`[ghentevent] fb:${fbEvents.length} feesten:${feEvents.length} deduped:${removed} → ${ALL.length}`);
    status.textContent=`◉ LIVE · FB ${fbEvents.length} · FEESTEN ${feEvents.length} · ${ALL.length} EVENTS`;
  }else{
    ALL=SAMPLE;
    console.warn('[ghentevent] both fetches empty/failed — using built-in sample');
    status.textContent='◌ DEMO DATA · live sheets unreachable';
  }

  ALL.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')||a.time.localeCompare(b.time));
  DATES=[...new Set(ALL.filter(e=>e.date).map(e=>e.date))].sort();
  dayIdx=defaultDateIndex();
  DAY_MARKERS.clear();

  renderChips();
  buildRail();
  renderAll();
}

// ════════════════════════════════════════════════════════════════════════════
//  STARRING + ROUTE BUILDER
//  localStorage: "underghent.starred.v1", "underghent.starredFilter.v1"
// ════════════════════════════════════════════════════════════════════════════
const LS_STARRED='underghent.starred.v1';
const LS_STARFILTER='underghent.starredFilter.v1';
const TRAVELMODE='walking';
const DEFAULT_START='Gent-Sint-Pieters';

function eventKey(ev){ return ev.sid || `${ev.title}|${ev.date}|${ev.venue}`; }

function loadStarred(){
  try{ const a=JSON.parse(localStorage.getItem(LS_STARRED)||'[]');
       if(Array.isArray(a)) a.forEach(k=>STARRED.add(k)); }catch(e){}
  try{ starFilterOn = localStorage.getItem(LS_STARFILTER)==='1'; }catch(e){}
}
function saveStarred(){    try{ localStorage.setItem(LS_STARRED,JSON.stringify([...STARRED])); }catch(e){} }
function saveStarFilter(){ try{ localStorage.setItem(LS_STARFILTER, starFilterOn?'1':'0'); }catch(e){} }

function isStarred(key){ return STARRED.has(key); }

function setStarVisual(btn,on){
  btn.textContent = on?'★':'☆';
  btn.classList.toggle('starred',on);
  btn.setAttribute('aria-pressed', on?'true':'false');
  btn.setAttribute('aria-label', on?'Remove from starred':'Add to starred');
}
function toggleStar(key){
  if(STARRED.has(key)) STARRED.delete(key); else STARRED.add(key);
  saveStarred();
  document.querySelectorAll('.starbtn').forEach(btn=>{
    if(btn.dataset.key===key) setStarVisual(btn,STARRED.has(key));
  });
  updateRouteBtn();
  if(starFilterOn) renderAll(); else renderBadge();
}

function starredEvents(){ return ALL.filter(e=>isStarred(eventKey(e))); }
function starredDays(){ return [...new Set(starredEvents().filter(e=>e.date).map(e=>e.date))].sort(); }
function soonestDay(days){
  const today=new Date().toISOString().slice(0,10);
  return days.find(d=>d>=today) || days[0];
}
function updateRouteBtn(){
  const btn=document.getElementById('routebtn');
  if(btn) btn.disabled = starredEvents().length===0;
}

function openRouteModal(){
  if(!starredEvents().length) return;
  const days=starredDays();
  const wrap=document.getElementById('rm-daywrap');
  const sel=document.getElementById('rm-day');
  if(days.length>1){
    sel.innerHTML=days.map(d=>`<option value="${esc(d)}">${esc(dayLabel(d))}</option>`).join('');
    sel.value=soonestDay(days);
    wrap.style.display='block';
  }else{
    wrap.style.display='none';
  }
  document.getElementById('rm-notice').style.display='none';
  document.getElementById('routemodal').style.display='flex';
  document.getElementById('rm-start').focus();
}
function closeRouteModal(){ document.getElementById('routemodal').style.display='none'; }

function buildRoute(){
  const start=document.getElementById('rm-start').value.trim()||DEFAULT_START;
  const end  =document.getElementById('rm-end').value.trim()||DEFAULT_START;
  const days=starredDays();
  let evs=starredEvents();
  let chosen=null;
  if(days.length>1) chosen=document.getElementById('rm-day').value;
  else if(days.length===1) chosen=days[0];
  if(chosen) evs=evs.filter(e=>e.date===chosen);
  evs.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const waypoints=evs.map(e=>
    (e.lat!=null&&e.lng!=null) ? `${e.lat},${e.lng}` : `${e.venue||'Gent'}, Gent`);
  const url='https://www.google.com/maps/dir/?api=1'
    +'&origin='+encodeURIComponent(start)
    +'&destination='+encodeURIComponent(end)
    +'&waypoints='+waypoints.map(encodeURIComponent).join('|')
    +'&travelmode='+TRAVELMODE;
  window.open(url,'_blank','noopener');
  if(waypoints.length>9){
    const n=document.getElementById('rm-notice');
    n.textContent='⚠ '+waypoints.length+' STOPS — GOOGLE MAPS MAY TRUNCATE VERY LONG ROUTES.';
    n.style.display='block';
  }else{
    closeRouteModal();
  }
}

function initStarUI(){
  const ff=document.getElementById('starfilter');
  ff.classList.toggle('on',starFilterOn);
  ff.setAttribute('aria-pressed',starFilterOn?'true':'false');
  ff.addEventListener('click',()=>{
    starFilterOn=!starFilterOn; saveStarFilter();
    ff.classList.toggle('on',starFilterOn);
    ff.setAttribute('aria-pressed',starFilterOn?'true':'false');
    renderAll();
  });

  const rb=document.createElement('button');
  rb.id='routebtn'; rb.type='button'; rb.className='routebtn'; rb.textContent='▶ ROUTE';
  rb.title='Build a walking route through your starred events';
  rb.addEventListener('click',openRouteModal);
  if(map){
    map.getContainer().appendChild(rb);
    if(window.L&&L.DomEvent){ L.DomEvent.disableClickPropagation(rb); L.DomEvent.disableScrollPropagation(rb); }
    map.getContainer().addEventListener('click',e=>{
      const b=e.target.closest('.popstar'); if(!b) return;
      e.preventDefault(); e.stopPropagation();
      toggleStar(b.dataset.key);
    });
    map.on('popupopen',e=>{
      const el=e.popup.getElement();
      const b=el&&el.querySelector('.popstar');
      if(b) setStarVisual(b,isStarred(b.dataset.key));
    });
  }
  updateRouteBtn();

  document.getElementById('feed').addEventListener('click',e=>{
    const b=e.target.closest('.liststar'); if(!b) return;
    e.preventDefault(); e.stopPropagation();
    toggleStar(b.dataset.key);
  });

  document.getElementById('rm-cancel').addEventListener('click',closeRouteModal);
  document.getElementById('rm-build').addEventListener('click',buildRoute);
  document.getElementById('routemodal').addEventListener('click',e=>{
    if(e.target.id==='routemodal') closeRouteModal();
  });
  document.getElementById('rm-geo').addEventListener('click',()=>{
    const btn=document.getElementById('rm-geo');
    if(!navigator.geolocation){ btn.textContent='NO GEO'; return; }
    btn.textContent='LOCATING…'; btn.disabled=true;
    navigator.geolocation.getCurrentPosition(
      pos=>{ document.getElementById('rm-start').value=
               pos.coords.latitude.toFixed(5)+','+pos.coords.longitude.toFixed(5);
             btn.textContent='USE MY LOCATION'; btn.disabled=false; },
      ()=>{ btn.textContent='USE MY LOCATION'; btn.disabled=false; },
      {enableHighAccuracy:false,timeout:8000,maximumAge:60000}
    );
  });
}

// ── Logo "tune-in" on load ─────────────────────────────────────────────────
function tuneIn(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const el=document.getElementById('logo');
  const FINAL='GHENT//EVENT';
  const CHARS='▓▒░<>/\\|#@%&';
  let frame=0;
  const t=setInterval(()=>{
    frame++;
    const reveal=Math.floor(frame*1.4);
    let out='';
    for(let i=0;i<FINAL.length;i++){
      out += i<reveal ? FINAL[i] : CHARS[(Math.random()*CHARS.length)|0];
    }
    el.textContent=out;
    if(reveal>=FINAL.length){
      clearInterval(t);
      el.innerHTML='GHENT<span class="lx">//</span>EVENT';
    }
  },42);
}

initMap();
loadStarred();
initStarUI();
setView('map');
tuneIn();
load();
</script>
